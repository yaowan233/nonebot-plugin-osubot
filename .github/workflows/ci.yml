name: CI

on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: coverage-${{ github.ref }}-${{ matrix.python-version }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    env:
      PYTHON: ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Create test environment file
        run: |
          cat > .env.test << 'EOF'
          DRIVER=~none
          SQLALCHEMY_DATABASE_URL=sqlite+aiosqlite:///file::memory:?uri=true&cache=shared
          ALEMBIC_STARTUP_CHECK=false
          EOF

      - name: Run tests
        run: uv run poe test

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          env_vars: PYTHON
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          env_vars: PYTHON
          token: ${{ secrets.CODECOV_TOKEN }}

  view:
    name: View Output
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          python-version: "3.12"
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Create test environment file
        run: |
          cat > .env.test << EOF
          DRIVER=~none
          SQLALCHEMY_DATABASE_URL=sqlite+aiosqlite:///file::memory:?uri=true&cache=shared
          ALEMBIC_STARTUP_CHECK=false
          OSU_CLIENT=${{ secrets.OSU_CLIENT }}
          OSU_KEY=${{ secrets.OSU_KEY }}
          EOF

      - name: Run view output tests
        run: uv run poe view

      - name: Upload output images
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: view-output-images
          path: tests/output/
          retention-days: 7
