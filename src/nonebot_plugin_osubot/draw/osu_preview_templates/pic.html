<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <base href="{{ base_url }}">
    <meta name="robots" content="nofollow, noindex, noarchive">
    <title>gif生成测试 网址后加#bid</title>
</head>


<body class="h">
    <img id="img"></img>

    <script src="js/util.js"></script>

    <script src="js/beatmap/beatmap.js"></script>
    <script src="js/beatmap/timingpoint.js"></script>
    <script src="js/beatmap/hitobject.js"></script>
    <script src="js/beatmap/point.js"></script>
    <script src="js/beatmap/scroll.js"></script>

    <script src="js/standard/standard.js"></script>
    <script src="js/standard/hitcircle.js"></script>
    <script src="js/standard/slider.js"></script>
    <script src="js/standard/curve/curve.js"></script>
    <script src="js/standard/curve/equaldistancemulticurve.js"></script>
    <script src="js/standard/curve/linearbezier.js"></script>
    <script src="js/standard/curve/catmullcurve.js"></script>
    <script src="js/standard/curve/curvetype.js"></script>
    <script src="js/standard/curve/bezier2.js"></script>
    <script src="js/standard/curve/centripetalcatmullrom.js"></script>
    <script src="js/standard/curve/circumstancedcircle.js"></script>
    <script src="js/standard/spinner.js"></script>

    <script src="js/taiko/taiko.js"></script>
    <script src="js/taiko/donkat.js"></script>
    <script src="js/taiko/drumroll.js"></script>
    <script src="js/taiko/shaker.js"></script>

    <script src="js/catch/LegacyRandom.js"></script>
    <script src="js/catch/catch.js"></script>
    <script src="js/catch/fruit.js"></script>
    <script src="js/catch/bananashower.js"></script>
    <script src="js/catch/juicestream.js"></script>
    <script src="js/catch/PalpableCatchHitObject.js"></script>

    <script src="js/mania/mania.js"></script>
    <script src="js/mania/hitnote.js"></script>
    <script src="js/mania/holdnote.js"></script>

    <script src="js/preview.js"></script>
    <script src="gif.js/gif.js"></script>

    <script>
        const scaleValue = {{ scale }};
        const durationValue = {{ duration }};
        const startTimeValue = {{ start_time | tojson }};
        const useMapStartValue = {{ use_map_start | tojson }};
        const qualityValue = 10;
        const timeSpanValue = 50;
        const taikoTimeSpanValue = 20;
        const configuredTimeSpanValue = {{ frame_time_span | tojson }};
        const taikoSkinAssets = {{ taiko_skin_assets | tojson }};

        const loadTaikoSkin = async function (assets) {
            const skin = {};
            await Promise.all(Object.entries(assets).map(function ([name, source]) {
                return new Promise(function (resolve) {
                    const image = new Image();
                    image.onload = function () {
                        skin[name] = image;
                        resolve();
                    };
                    image.onerror = resolve;
                    image.src = source;
                });
            }));
            return skin;
        };

        const createImg = function () {
            let preview = new Preview(scaleValue);
            const osufile = `{{ osu_file }}`;
            preview.load(osufile, async function () {
                if (preview.beatmap instanceof Taiko) {
                    preview.beatmap.skin = await loadTaikoSkin(taikoSkinAssets);
                }
                let actualStartTime;
                const previewEndTime = preview.previewTime + durationValue;
                if (startTimeValue !== null) {
                    actualStartTime = Math.max(preview.startTime, startTimeValue);
                } else if (useMapStartValue) {
                    actualStartTime = preview.startTime;
                } else if (
                    preview.previewTime >= preview.startTime &&
                    previewEndTime <= preview.endTime
                ) {
                    // 使用谱面预览时间
                    actualStartTime = preview.previewTime;
                } else {
                    // 预览时间加上持续时间超过谱面结束时间，使用用户指定的开始时间
                    actualStartTime = preview.startTime;
                }
                const actualEndTime = durationValue === -1 ? preview.endTime : Math.min(actualStartTime + durationValue, preview.endTime);
                document.documentElement.dataset.previewStart = String(preview.startTime);
                document.documentElement.dataset.previewEnd = String(preview.endTime);
                document.documentElement.dataset.actualStart = String(actualStartTime);
                document.documentElement.dataset.actualEnd = String(actualEndTime);
                let gif = new GIF({
                    workers: 4,
                    workerScript: "{{ worker_data_uri }}",
                    quality: qualityValue,
                    width: preview.screen.width * scaleValue,
                    height: preview.screen.height * scaleValue,
                    //transparent: "0x000000",
                });

                const frames = [];
                if (preview.beatmap instanceof Taiko) {
                    const frameTimeSpanValue =
                        configuredTimeSpanValue ?? taikoTimeSpanValue;
                    let currentFrame = 0;
                    while (
                        actualStartTime + currentFrame * frameTimeSpanValue <
                        actualEndTime
                    ) {
                        frames.push({
                            time: actualStartTime + currentFrame * frameTimeSpanValue,
                            delay: frameTimeSpanValue
                        });
                        currentFrame++;
                    }

                    // Replace the nearest regular sample for objects which
                    // cross the whole playfield in less than one frame. The
                    // cadence stays fixed at 50 FPS, but a sudden SV note is
                    // still represented by one frame at its hit time.
                    preview.beatmap.HitObjects.forEach(function (hitObject) {
                        if (
                            hitObject.time < actualStartTime ||
                            hitObject.time >= actualEndTime
                        ) {
                            return;
                        }
                        const visibleDuration =
                            (Taiko.PLAYFIELD_LENGTH + Taiko.DIAMETER) /
                            (
                                Taiko.BASE_SCROLL_SPEED *
                                preview.beatmap.scrollMultiplierAt(hitObject.time)
                            );
                        if (visibleDuration >= frameTimeSpanValue) {
                            return;
                        }
                        const frameIndex = Math.round(
                            (hitObject.time - actualStartTime) / frameTimeSpanValue
                        );
                        if (frames[frameIndex]) {
                            frames[frameIndex].time = hitObject.time;
                        }
                    });
                } else {
                    const frameTimeSpanValue =
                        configuredTimeSpanValue ?? (
                            preview.beatmap instanceof Mania
                            ? taikoTimeSpanValue
                            : timeSpanValue
                        );
                    let currentFrame = 0;
                    while (
                        actualStartTime + currentFrame * frameTimeSpanValue <
                        actualEndTime
                    ) {
                        frames.push({
                            time: actualStartTime + currentFrame * frameTimeSpanValue,
                            delay: frameTimeSpanValue
                        });
                        currentFrame++;
                    }
                }

                // 添加帧
                frames.forEach(function (frame) {
                    preview.at(frame.time);

                    gif.addFrame(preview.ctx, {
                        copy: true,
                        delay: frame.delay
                    });
                });
                gif.on('finished', function (blob) {
                    document.getElementById("img").src = URL.createObjectURL(blob);
                });
                gif.render();
            });
        }
        window.addEventListener('hashchange', createImg);
        createImg();
    </script>
</body>

</html>
