<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
@font-face{font-family:Torus;src:url('../../osufile/fonts/Torus Regular.otf')}@font-face{font-family:Torus;src:url('../../osufile/fonts/Torus SemiBold.otf');font-weight:800}@font-face{font-family:FASolid;src:url('../../osufile/fonts/fa-solid.woff2') format('woff2');font-weight:900}*{box-sizing:border-box}html,body{margin:0;width:1440px;background:#dfe4e8;color:#101824;font-family:Torus,"Microsoft YaHei",sans-serif}.page{width:1400px;margin:20px;background:#f5f1e9;overflow:hidden;position:relative;box-shadow:0 24px 70px #27313b38}.page:before{content:"";position:absolute;z-index:10;inset:0 0 auto;height:4px;background:linear-gradient(90deg,#ff3f8e 0 30%,#20a9b8 30%)}.top{height:185px;display:grid;grid-template-columns:420px 1fr;background:#f5f1e9}.profile{display:flex;align-items:center;gap:24px;padding:34px 48px;background:linear-gradient(120deg,#e8ece9,#f5f1e9);border-top:4px solid #ff3f8e;border-right:1px solid #c9ced1;position:relative}.profile:after{content:"";position:absolute;right:-1px;top:24px;width:4px;height:67px;background:linear-gradient(#ff3f8e 0 62%,#20a9b8 62%)}.avatar{width:110px;height:110px;object-fit:cover;border-radius:8px;box-shadow:10px 10px 0 #ff3f8e}.overline{font-size:11px;letter-spacing:.16em;color:#df347c;font-weight:800}.name-line{display:flex;align-items:center;gap:9px;margin:7px 0}.name{max-width:205px;font-size:37px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.supporter{display:inline-flex;flex:none;align-items:center;height:23px;padding:0 7px;border-radius:12px;background:linear-gradient(135deg,#f764a8,#e93689)}.supporter i{font:900 9px FASolid;color:#fff;font-style:normal}.minor{display:flex;align-items:center;gap:7px;color:#6f7d88;font-size:12px;white-space:nowrap}.team-logo{width:31px;height:22px;padding:2px;object-fit:contain;border-radius:4px;background:#fff;box-shadow:0 2px 6px #28313b28}.summary{padding:34px 48px 28px 65px;border-top:4px solid #20a9b8}.summary-line{display:flex;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid #c9ced1;font-size:11px;color:#74808a}.summary-line b{color:#65717c}.headline{display:flex;align-items:end;justify-content:space-between;margin-top:20px}.headline h1{margin:0;font-size:36px;letter-spacing:-.025em}.headline h1 i{font-style:normal;color:#ff3f8e}.facts{display:flex;gap:27px}.fact{min-width:100px;padding-left:12px;border-left:1px solid #c9ced1}.fact span{display:block;font-size:9px;color:#7b8690}.fact b{display:block;margin-top:4px;font-size:15px}.content{padding:28px 36px 36px;background-image:radial-gradient(#26303a10 1px,transparent 1px);background-size:17px 17px}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:24px 15px}.card{min-width:0;position:relative}.visual{height:145px;position:relative;border-radius:8px;overflow:hidden;border:1px solid #fff;box-shadow:0 8px 18px #27313b2b;background:#101925}.cover{width:100%;height:100%;object-fit:cover;filter:saturate(.9) contrast(1.03)}.visual:after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 35%,#07111de0)}.badge,.star,.mods,.pp{position:absolute;z-index:5}.badge{left:12px;top:12px;min-width:35px;padding:6px 9px;border-radius:14px;background:#ff3f8e;color:#fff;text-align:center;font-size:10px;font-weight:800}.star{right:12px;top:12px;padding:6px 10px;border-radius:14px;background:var(--star);color:var(--star-text);font-size:10px;font-weight:800;box-shadow:0 2px 7px #0005}.mods{left:12px;bottom:12px;display:flex}.mods img{width:30px;height:30px;object-fit:contain;filter:drop-shadow(0 2px 5px #0008)}.mods img+img{margin-left:-4px}.pp{right:12px;bottom:12px;padding:6px 10px;border-radius:14px;background:linear-gradient(135deg,#ffe78d,#eeb957);color:#17202b;font-size:11px;font-weight:800;box-shadow:0 3px 8px #0004}.title{position:relative;margin-top:10px;padding-left:10px;font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title:before{content:"";position:absolute;left:0;top:2px;width:4px;height:13px;background:#ff3f8e;border-radius:2px}.card:nth-child(3n) .title:before{background:#20a9b8}.meta,.detail{display:flex;justify-content:space-between;gap:8px;margin-top:6px;color:#7c8790;font-size:10px}.detail{padding-top:5px;border-top:1px dotted #c8ced1}.meta span,.detail span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.meta b{flex:none;color:#e33c83}.detail b{flex:none;color:#20a2b1}.dense .content{padding:22px 30px 32px}.dense .grid{grid-template-columns:repeat(6,1fr);gap:17px 12px}.dense .visual{height:112px}.dense .title{margin-top:7px;font-size:12px}.dense .title:before{height:10px}.dense .meta,.dense .detail{margin-top:4px;font-size:8px}.dense .detail{padding-top:4px}.dense .badge,.dense .star{top:8px}.dense .badge{left:8px;padding:5px 7px}.dense .star{right:8px;padding:5px 8px}.dense .mods{left:8px;bottom:8px}.dense .mods img{width:24px;height:24px}.dense .pp{right:8px;bottom:8px;padding:5px 8px;font-size:9px}
.profile>div{width:190px;min-width:0}.minor{width:190px;align-items:center;white-space:normal}.minor-lines{display:flex;min-width:0;flex:1;flex-direction:column;gap:2px;line-height:1.2}.minor-lines span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.team-logo{flex:0 0 auto}
</style></head><body><main id="display" class="page"></main><script>
const data={{payload_json}},p=data.plays||[],u=data.user,s=u.statistics||{};const n=(v,d=0)=>Number(v||0).toLocaleString('zh-CN',{minimumFractionDigits:d,maximumFractionDigits:d});const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const modes={osu:'标准',taiko:'太鼓',fruits:'接水果',mania:'键盘'};const stops=[[.1,'#4290FB'],[1.25,'#4FC0FF'],[2,'#4FFFD5'],[2.5,'#7CFF4F'],[3.3,'#F6F05C'],[4.2,'#FF8068'],[4.9,'#FF4E6F'],[5.8,'#C645B8'],[6.7,'#6563DE'],[7.7,'#18158E'],[9,'#000000']];function mix(a,b,t){let x=parseInt(a.slice(1),16),y=parseInt(b.slice(1),16);return'#'+[16,8,0].map(k=>Math.round(((x>>k)&255)*(1-t)+((y>>k)&255)*t).toString(16).padStart(2,'0')).join('')}function star(v){v=Number(v);if(v<.1)return'#aaa';if(v>=9)return'#000';for(let i=1;i<stops.length;i++)if(v<=stops[i][0])return mix(stops[i-1][1],stops[i][1],(v-stops[i-1][0])/(stops[i][0]-stops[i-1][0]));return'#000'}const avgPp=p.length?p.reduce((a,x)=>a+x.pp,0)/p.length:0,avgAcc=p.length?p.reduce((a,x)=>a+x.accuracy,0)/p.length:0,peak=Math.max(...p.map(x=>x.stars),0),support=Math.max(0,Math.min(5,u.support_level||0)),team=u.team;const cards=p.map(x=>`<article class="card"><div class="visual"><img class="cover" src="${x.cover}"><span class="badge">#${x.index}</span><span class="star" style="--star:${star(x.stars)};--star-text:${x.stars<6.5?'#101925':'#ffd966'}">${n(x.stars,2)}★</span><span class="mods">${x.mods.map(m=>`<img src="../../osufile/mods/${m}.png" alt="${m}">`).join('')}</span><span class="pp">${n(x.pp,2)} pp</span></div><div class="title" title="${esc(x.title)}">${esc(x.title)}</div><div class="meta"><span>${esc(x.artist)}</span><b>${n(x.accuracy,2)}%</b></div><div class="detail"><span title="${esc(x.version)}">${esc(x.version)}</span><b>${x.date}</b></div></article>`).join('');document.getElementById('display').classList.toggle('dense',p.length>50);document.getElementById('display').innerHTML=`<header class="top"><section class="profile"><img class="avatar" src="${u.avatar}"><div><div class="overline">OSU! 最佳成绩档案</div><div class="name-line"><div class="name" title="${esc(u.name)}">${esc(u.name)}</div>${support?`<span class="supporter">${'<i>&#xf004;</i>'.repeat(support)}</span>`:''}</div><div class="minor">${team?.flag_url?`<img class="team-logo" src="${team.flag_url}">`:''}<span>${u.country}${team?` · ${esc(team.short_name||team.name)}`:''} · 全球 #${n(s.global_rank)} · ${n(s.pp,1)} pp</span></div></div></section><section class="summary"><div class="summary-line"><b>${modes[data.mode]||data.mode}模式 / ${esc(data.section_title)}</b><span>共 ${p.length} 项 · ${data.generated_at}</span></div><div class="headline"><h1>${esc(data.section_title)} <i>/ ${esc(data.range_label)}</i></h1><div class="facts"><div class="fact"><span>平均 PP</span><b>${n(avgPp,2)}</b></div><div class="fact"><span>平均准确率</span><b>${n(avgAcc,2)}%</b></div><div class="fact"><span>最高星数</span><b>${n(peak,2)}★</b></div></div></div></section></header><section class="content"><div class="grid">${cards}</div></section>`;
</script><script>
const minor=document.querySelector('.minor');if(minor){minor.innerHTML=`${team?.flag_url?`<img class="team-logo" src="${team.flag_url}">`:''}<span class="minor-lines"><span>${u.country}${team?` · ${esc(team.short_name||team.name)}`:''}</span><span>全球 #${n(s.global_rank)} · ${n(s.pp,1)} pp</span></span>`}
</script></body></html>
